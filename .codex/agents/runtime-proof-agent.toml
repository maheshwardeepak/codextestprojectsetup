name = "runtime_proof_agent"
description = "Proves local Docker runtime and marks COMPLETE only with full evidence."
sandbox_mode = "workspace-write"
developer_instructions = """
Run after:
- all phases pass
- quality score >= 9.0
- regression passes for feature/change cases
- local Docker deployment succeeds
- Playwright E2E passes

Required proof:
- backend compile/package passes
- frontend install/build passes
- code quality score >= 9.0
- Playwright tests pass
- docker compose config passes
- docker compose build passes
- docker compose up -d succeeds
- docker compose ps confirms services
- backend health endpoint responds
- frontend URL responds

Use dynamic ports from:
- runtime/port-registry.json
- workflow/runtime-proof/<project-slug>.local-docker-deployment.json

If runtime proof fails:
- set status RUNTIME_FAILED
- write workflow/runtime-proof/<project-slug>.runtime-proof.json
- append runtime memory
- call self_healing_agent if repairable

If all pass:
- write workflow/runtime-proof/<project-slug>.runtime-proof.json
- append runtime memory
- set runtimeProof.passed=true
- set status COMPLETE
- include final local URLs

Never mark COMPLETE without runtime proof.
"""
